name: Fix Dashboard v3

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Download nieuwe dashboard.py via GitHub API
        run: |
          python3 - << 'EOF'
import urllib.request
import base64
import json

# Haal de gecorrigeerde versie op via de raw GitHub URL van een gist
# We maken dashboard.py aan via een Python heredoc
content = open('dashboard.py').read()
print("Huidige dashboard.py geladen:", len(content), "bytes")
EOF

      - name: Maak dashboard v3
        run: |
          python3 - << 'PYEOF'
import os

new_code = """
import sqlite3, json, os
from datetime import datetime

DB_PATH = "nieuws.db"
THEMA_KLEUREN = {
    "mobiliteit": "#3b82f6", "veiligheid": "#ef4444", "politiek": "#8b5cf6",
    "cultuur": "#f59e0b", "sport": "#22c55e", "natuur": "#06b6d4",
    "economie": "#a855f7", "algemeen": "#94a3b8"
}

def get_data():
    conn = sqlite3.connect(DB_PATH)
    recent = conn.execute("SELECT titel, url, bron_naam, datum, thema, toegevoegd FROM artikels ORDER BY toegevoegd DESC LIMIT 200").fetchall()
    thema_30d = conn.execute("SELECT thema, COUNT(*) as aantal FROM artikels WHERE toegevoegd >= date('now', '-30 days') GROUP BY thema ORDER BY aantal DESC").fetchall()
    bron_30d = conn.execute("SELECT bron_naam, COUNT(*) as aantal FROM artikels WHERE toegevoegd >= date('now', '-30 days') GROUP BY bron_naam ORDER BY aantal DESC").fetchall()
    weekly_raw = conn.execute("SELECT strftime('%Y-W%W', toegevoegd) as week, thema, bron_naam, COUNT(*) as aantal FROM artikels WHERE toegevoegd >= date('now', '-35 days') GROUP BY week, thema, bron_naam ORDER BY week").fetchall()
    totaal = conn.execute("SELECT COUNT(*) FROM artikels").fetchone()[0]
    bronnen = conn.execute("SELECT DISTINCT bron_naam FROM artikels ORDER BY bron_naam").fetchall()
    conn.close()
    return recent, thema_30d, bron_30d, weekly_raw, totaal, bronnen

def build_dashboard():
    recent, thema_30d, bron_30d, weekly_raw, totaal, bronnen = get_data()
    nu = datetime.now().strftime("%d/%m/%Y %H:%M")
    thema_cards = ""
    for thema, count in thema_30d:
        k = THEMA_KLEUREN.get(thema, "#94a3b8")
        thema_cards += '<div class="thema-card" onclick="tf(\'thema\',\'' + thema + '\')" data-thema="' + thema + '" style="border-top:3px solid ' + k + ';"><div class="thema-count" style="color:' + k + ';">' + str(count) + '</div><div class="thema-naam">' + thema.capitalize() + '</div></div>'
    week_data = {}
    for row in weekly_raw:
        w, t, b, a = row
        if w not in week_data: week_data[w] = {"totaal":0,"themas":{},"bronnen":{}}
        week_data[w]["totaal"] += a
        week_data[w]["themas"][t] = week_data[w]["themas"].get(t,0) + a
        week_data[w]["bronnen"][b] = week_data[w]["bronnen"].get(b,0) + a
    wdj = json.dumps(week_data)
    bl = json.dumps([b[0] for b in bron_30d])
    bv = json.dumps([b[1] for b in bron_30d])
    ab = json.dumps([b[0] for b in bronnen])
    tk = json.dumps(THEMA_KLEUREN)
    ar = ""
    for a in recent:
        titel,url,bron,datum,thema,tg = a
        k = THEMA_KLEUREN.get(thema,"#94a3b8")
        ds = tg[:10] if tg else ""
        ar += '<div class="artikel-rij" data-thema="'+thema+'" data-bron="'+bron+'"><span class="thema-badge" style="background:'+k+';">'+thema+'</span><a href="'+url+'" target="_blank" class="artikel-titel">'+titel+'</a><span class="artikel-meta">'+bron+' &middot; '+ds+'</span></div>'
    p=[]
    p.append('<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Dendermonde Nieuws</title><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Inter,sans-serif;background:#f0f4f8;color:#1e293b;}header{background:linear-gradient(135deg,#1e3a5f,#2563eb);padding:28px 32px;}.header-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}h1{font-size:26px;font-weight:800;color:white;}h1 span{color:#93c5fd;}.update-info{font-size:12px;color:#bfdbfe;text-align:right;}.container{max-width:1200px;margin:0 auto;padding:24px 32px;}.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;}.stat-box{background:white;border-radius:14px;padding:22px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid #e2e8f0;}.stat-num{font-size:42px;font-weight:800;color:#2563eb;line-height:1;}.stat-label{font-size:11px;color:#94a3b8;margin-top:6px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;}.section-title{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;}.thema-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:28px;}.thema-card{background:white;border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e2e8f0;}.thema-card:hover{transform:translateY(-2px);}.thema-card.active{background:#eff6ff;border-color:#2563eb;}.thema-count{font-size:28px;font-weight:800;line-height:1;}.thema-naam{font-size:12px;color:#64748b;margin-top:4px;}.charts-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;margin-bottom:28px;}.chart-box{background:white;border-radius:14px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid #e2e8f0;}.chart-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}.filter-chip{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;cursor:pointer;border:1.5px solid #e2e8f0;background:white;color:#64748b;}.artikels-box{background:white;border-radius:14px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid #e2e8f0;}.search-row{display:flex;gap:10px;margin-bottom:12px;}.search-row input{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 14px;color:#1e293b;font-size:13px;flex:1;font-family:inherit;}.search-row input:focus{outline:none;border-color:#2563eb;}.btn-reset{background:#f1f5f9;color:#64748b;border:none;border-radius:8px;padding:9px 16px;font-size:12px;cursor:pointer;font-weight:600;font-family:inherit;}.bron-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}.active-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}.active-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;color:white;display:flex;align-items:center;gap:4px;}.artikel-rij{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9;flex-wrap:wrap;}.artikel-rij:last-child{border-bottom:none;}.thema-badge{font-size:10px;font-weight:700;color:white;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px;}.artikel-titel{color:#1e293b;text-decoration:none;font-size:14px;flex:1;min-width:200px;font-weight:500;}.artikel-titel:hover{color:#2563eb;}.artikel-meta{font-size:11px;color:#94a3b8;white-space:nowrap;flex-shrink:0;margin-top:2px;}@media(max-width:768px){.charts-grid{grid-template-columns:1fr;}.container{padding:16px;}}</style></head><body>')
    p.append('<header><div class="header-inner"><div><h1>Dendermonde <span>Nieuws</span></h1><div style="color:#bfdbfe;font-size:13px;">Lokaal nieuwsoverzicht</div></div><div class="update-info">Laatste update<br><strong>')
    p.append(nu)
    p.append('</strong></div></div></header><div class="container"><div class="stats-row"><div class="stat-box"><div class="stat-num">')
    p.append(str(totaal))
    p.append('</div><div class="stat-label">Totaal artikels</div></div><div class="stat-box"><div class="stat-num">')
    p.append(str(len(thema_30d)))
    p.append('</div><div class="stat-label">Themas (30d)</div></div><div class="stat-box"><div class="stat-num">')
    p.append(str(len(bron_30d)))
    p.append('</div><div class="stat-label">Bronnen</div></div></div><div class="section-title">Themas (laatste 30 dagen) &mdash; klik om te filteren</div><div class="thema-grid">')
    p.append(thema_cards)
    p.append('</div><div class="charts-grid"><div class="chart-box"><div class="section-title">Artikels per week (laatste 5 weken)</div><div class="chart-filters" id="wf"></div><canvas id="wc"></canvas></div><div class="chart-box"><div class="section-title">Verdeling per bron (30d)</div><canvas id="bc"></canvas></div></div><div class="artikels-box"><div class="section-title" style="margin-bottom:10px;">Recente artikels</div><div class="bron-filter" id="bf"></div><div class="search-row"><input type="text" id="zoek" placeholder="Zoek in titels..." oninput="fa()"><button class="btn-reset" onclick="rf()">Reset filters</button></div><div class="active-filters" id="af"></div><div id="al">')
    p.append(ar)
    p.append('</div></div></div><script>const WD=')
    p.append(wdj)
    p.append(',TK=')
    p.append(tk)
    p.append(',AB=')
    p.append(ab)
    p.append(""";
let aT=new Set(),aB=new Set();
const bfe=document.getElementById('bf');
AB.forEach(b=>{const c=document.createElement('span');c.className='filter-chip';c.textContent=b;c.id='b_'+b.replace(/[^a-zA-Z0-9]/g,'_');c.onclick=()=>tf('bron',b);bfe.appendChild(c);});
const wfe=document.getElementById('wf');
[['Totaal',null],...AB.map(b=>[b,b])].forEach(([l,v])=>{const c=document.createElement('span');c.className='filter-chip'+(v===null?' active':'');c.textContent=l;c.id='w_'+(v||'t').replace(/[^a-zA-Z0-9]/g,'_');if(!v){c.style.cssText='background:#2563eb;color:white;border-color:#2563eb';}c.onclick=()=>swf(v);wfe.appendChild(c);});
const weken=Object.keys(WD);
const wchart=new Chart(document.getElementById('wc'),{type:'bar',data:{labels:weken,datasets:[{data:weken.map(w=>WD[w].totaal),backgroundColor:'#3b82f6',borderRadius:5}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#94a3b8'},grid:{color:'#f1f5f9'}},y:{ticks:{color:'#94a3b8'},grid:{color:'#f1f5f9'},beginAtZero:true}}}});
new Chart(document.getElementById('bc'),{type:'doughnut',data:{labels:""")
    p.append(bl)
    p.append(""",datasets:[{data:""")
    p.append(bv)
    p.append(""",backgroundColor:['#3b82f6','#22c55e','#f59e0b','#ef4444'],borderWidth:2,borderColor:'white'}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#64748b',font:{size:11},boxWidth:12,padding:12}}}}});
function swf(f){document.querySelectorAll('#wf .filter-chip').forEach(c=>{c.style.cssText='background:white;color:#64748b;border-color:#e2e8f0';});const e=document.getElementById('w_'+(f||'t').replace(/[^a-zA-Z0-9]/g,'_'));if(e)e.style.cssText='background:#2563eb;color:white;border-color:#2563eb';wchart.data.datasets[0].data=weken.map(w=>f?(WD[w].bronnen[f]||0):WD[w].totaal);wchart.update();}
function tf(type,val){const s=type==='thema'?aT:aB,k=type==='thema'?(TK[val]||'#2563eb'):'#475569',eid=type==='bron'?'b_'+val.replace(/[^a-zA-Z0-9]/g,'_'):null,cel=type==='thema'?document.querySelector('.thema-card[data-thema="'+val+'"]'):null,che=eid?document.getElementById(eid):null;if(s.has(val)){s.delete(val);if(cel)cel.classList.remove('active');if(che)che.style.cssText='background:white;color:#64748b;border-color:#e2e8f0';}else{s.add(val);if(cel)cel.classList.add('active');if(che)che.style.cssText='background:'+k+';color:white;border-color:'+k;}uat();fa();}
function uat(){const el=document.getElementById('af');el.innerHTML='';aT.forEach(t=>{const k=TK[t]||'#2563eb';el.innerHTML+='<span class="active-tag" style="background:'+k+'">'+t+' <span onclick="tf(\'thema\',\''+t+'\')" style="cursor:pointer">x</span></span>';});aB.forEach(b=>{el.innerHTML+='<span class="active-tag" style="background:#475569">'+b+' <span onclick="tf(\'bron\',\''+b+'\')" style="cursor:pointer">x</span></span>';});}
function fa(){const z=document.getElementById('zoek').value.toLowerCase();document.querySelectorAll('.artikel-rij').forEach(r=>{r.style.display=(!z||r.querySelector('.artikel-titel').textContent.toLowerCase().includes(z))&&(aT.size===0||aT.has(r.dataset.thema))&&(aB.size===0||aB.has(r.dataset.bron))?'':'none';});}
function rf(){aT.clear();aB.clear();document.getElementById('zoek').value='';document.querySelectorAll('.thema-card').forEach(c=>c.classList.remove('active'));document.querySelectorAll('.bron-filter .filter-chip').forEach(c=>c.style.cssText='background:white;color:#64748b;border-color:#e2e8f0');document.getElementById('af').innerHTML='';document.querySelectorAll('.artikel-rij').forEach(r=>r.style.display='');swf(null);}
</script></body></html>""")
    os.makedirs("docs",exist_ok=True)
    with open("docs/index.html","w",encoding="utf-8") as f: f.write(''.join(p))
    print("OK")

if __name__=="__main__": build_dashboard()
"""

with open('dashboard.py','w') as f: f.write(new_code.strip())
print("dashboard.py vervangen")
PYEOF

      - name: Run dashboard om docs te genereren
        run: |
          pip install -q sqlite3 2>/dev/null || true
          python3 -c "
import sqlite3, os
os.makedirs('docs', exist_ok=True)
# Maak lege db als die er niet is
conn = sqlite3.connect('nieuws.db')
conn.execute('''CREATE TABLE IF NOT EXISTS artikels (id TEXT PRIMARY KEY, bron TEXT, bron_naam TEXT, titel TEXT, url TEXT, datum TEXT, thema TEXT, toegevoegd TEXT)''')
conn.close()
print('DB ok')
"
          python3 dashboard.py

      - name: Push
        run: |
          git config user.name "Nieuws Bot"
          git config user.email "bot@dendermonde-nieuws.be"
          git add dashboard.py docs/
          git diff --staged --quiet || git commit -m "Fix dashboard v3: licht thema + filters"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/Casparty/dendermonde-nieuws.git
